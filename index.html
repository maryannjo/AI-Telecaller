<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Caller - SaaS Dashboard v3</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: #0a0f1c;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* MASTER GRID */
    .app {
      width: 1300px;
      height: 760px;
      display: grid;
      grid-template-columns: 260px 1.6fr 340px;
      gap: 14px;
    }

    .panel {
      background: #0f172a;
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }

    /* LEFT: CUSTOMER LIST */
    .customer {
      padding: 10px;
      background: #0b1220;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.2s;
      font-size: 12px;
    }

    .customer:hover {
      border-color: #38bdf8;
      transform: translateY(-1px);
    }

    .active {
      border-color: #22c55e !important;
    }

    /* CENTER CHAT */
    .status {
      padding: 6px;
      font-size: 12px;
      border-radius: 999px;
      text-align: center;
      margin-bottom: 10px;
      background: rgba(148,163,184,0.1);
      color: #94a3b8;
    }

    .chat {
      height: 520px;
      overflow-y: auto;
      background: #0b1220;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .msg {
      font-size: 12px;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #22c55e;
      color: #052e12;
      margin-left: auto;
    }

    .bot {
      background: #1f2937;
      margin-right: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0b1220;
      color: white;
    }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .start { background: #2563eb; color: white; }
    .stop { background: #dc2626; color: white; }
    .send { background: #16a34a; color: white; }

    /* RIGHT PANEL */
    .meter {
      height: 8px;
      background: #0b1220;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e);
      transition: 0.4s;
    }

    .stat {
      font-size: 12px;
      margin: 6px 0;
      color: #cbd5e1;
    }

    /* ADMIN */
    .adminBox {
      background: #0b1220;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    /* LIVE PULSE */
    .pulse {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1s infinite;
      margin-right: 6px;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.4; }
      100% { transform: scale(1); opacity: 1; }
    }

  </style>
</head>

<body>

<div class="app">

  <!-- LEFT: MULTI CUSTOMER -->
  <div class="panel">
    <h3>🧑‍🤝‍🧑 LEADS</h3>

    <div class="customer active" onclick="switchUser('Aarav')">Aarav - Hot Lead </div>
    <div class="customer" onclick="switchUser('Meera')">Meera - Warm Lead </div>
    <div class="customer" onclick="switchUser('John')">John - Cold Lead </div>
  </div>

  <!-- CENTER -->
  <div class="panel">

    <h3>📞 AI CALL AGENT</h3>

    <div class="status" id="status">
      <span class="pulse"></span>Idle
    </div>

    <div class="chat" id="chatBox">
      <div class="msg bot">AI ready for call...</div>
    </div>

    <input id="message" placeholder="Type or speak..." />

    <div class="btns">
      <button class="start" onclick="startCall()">Start</button>
      <button class="stop" onclick="stopCall()">Stop</button>
      <button class="send" onclick="sendMessage()">Send</button>
    </div>

  </div>

  <!-- RIGHT: ANALYTICS -->
  <div class="panel">

    <h3>📊 ADMIN ANALYTICS</h3>

    <div class="adminBox">
      <b>Total Calls:</b> <span id="calls">12</span><br>
      <b>Hot Leads:</b> <span id="hot">3</span><br>
      <b>Conversion:</b> <span>18%</span>
    </div>

    <h3>🔥 LIVE LEAD SCORE</h3>

    <div class="meter">
      <div class="fill" id="interestBar"></div>
    </div>

    <div class="stat" id="interestText">Warm Lead</div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.05);margin:10px 0;">

    <div class="stat">🎭 Emotion: Neutral</div>
    <div class="stat">🎯 Intent: Exploring</div>
    <div class="stat">⚡ WebSocket Feed: ACTIVE</div>

  </div>

</div>

<script>

let isCallActive = false;
let selectedUser = "Aarav";
let interest = 60;

// SWITCH USER (MULTI CUSTOMER)
function switchUser(name) {
  selectedUser = name;
  document.querySelectorAll(".customer").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("chatBox").innerHTML =
    `<div class='msg bot'>Switched to ${name}</div>`;

  simulateSocket("Switched lead: " + name);
}

// STATUS
function setStatus(text) {
  document.getElementById("status").innerHTML =
    `<span class='pulse'></span>${text}`;
}

// CHAT
function addMessage(role, text) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// LIVE SOCKET SIMULATION
function simulateSocket(msg) {
  console.log("📡 WS EVENT:", msg);
}

// INTEREST ENGINE
function updateInterest(val) {
  interest += val;
  interest = Math.max(0, Math.min(100, interest));

  document.getElementById("interestBar").style.width = interest + "%";

  let label = "Cold";
  if (interest > 75) label = " Hot";
  else if (interest > 50) label = " Warm";
  else label = " Cold";

  document.getElementById("interestText").innerText = label;
}

// START
async function startCall() {
  isCallActive = true;
  setStatus("Connecting Call...");

  const res = await fetch("http://localhost:3000/start");
  const data = await res.json();

  addMessage("bot", data.reply);
  simulateSocket("Call started");

  speak(data.reply);
}

// STOP
function stopCall() {
  isCallActive = false;
  speechSynthesis.cancel();
  setStatus("Call Ended");
}

// SPEAK
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);

  setStatus("Speaking...");

  u.onend = () => {
    setStatus("Listening...");
    updateInterest(Math.random() * 10);
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// SEND
async function sendMessage() {
  const input = document.getElementById("message");
  if (!input.value) return;

  addMessage("user", input.value);
  updateInterest(Math.random() * 12);

  const res = await fetch("http://localhost:3000/ask", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: input.value})
  });

  const data = await res.json();

  addMessage("bot", data.reply);
  speak(data.reply);

  input.value = "";
}

</script>

</body>
</html>
