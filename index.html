<!DOCTYPE html>
<html>
<head>
  <title>AI Voice Caller (US Voice Upgrade)</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 15px;
    }

    .status {
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .chat-box {
      height: 250px;
      overflow-y: auto;
      padding: 10px;
      background: #1f2937;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 6px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .user {
      background: #22c55e;
      text-align: right;
    }

    .bot {
      background: #374151;
      text-align: left;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .start { background: #3b82f6; color: white; }
    .stop { background: #ef4444; color: white; }
    .send { background: #22c55e; color: white; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📞 AI Voice Caller (US Voice)</h2>
  <div class="status" id="status">Idle</div>

  <div class="chat-box" id="chatBox">
    <div class="msg bot">AI is ready...</div>
  </div>

  <input id="message" placeholder="Type or speak..." />

  <div class="controls">
    <button class="start" onclick="startCall()">Start Call</button>
    <button class="stop" onclick="stopCall()">Stop</button>
    <button class="send" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>

let isCallActive = false;
let isSpeaking = false;
let selectedVoice = null;

// ==========================
// UI HELPERS
// ==========================
function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function addMessage(role, text) {
  const chatBox = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.classList.add("msg", role);
  div.innerText = text;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ==========================
// 🇺🇸 LOAD US VOICE
// ==========================
function loadVoices() {
  const voices = window.speechSynthesis.getVoices();

  selectedVoice =
    voices.find(v =>
      v.lang === "en-US" &&
      (
        v.name.toLowerCase().includes("google") ||
        v.name.toLowerCase().includes("microsoft") ||
        v.name.toLowerCase().includes("david") ||
        v.name.toLowerCase().includes("aria") ||
        v.name.toLowerCase().includes("zira")
      )
    ) || voices.find(v => v.lang === "en-US");

  console.log("🎤 Voice selected:", selectedVoice?.name);
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ==========================
// 🧠 HUMANIZE TEXT
// ==========================
function humanizeText(text) {
  return text
    .replace(/([.!?])\s*/g, "$1 ... ")
    .replace(/\b(very|really)\b/g, "")
    .trim();
}

// ==========================
// 🔊 US HUMAN SPEECH ENGINE
// ==========================
function speakHuman(text, onEnd) {
  if (!isCallActive) return;

  const utterance = new SpeechSynthesisUtterance();

  utterance.voice = selectedVoice;
  utterance.lang = "en-US";

  utterance.rate = 1.02;   // natural
  utterance.pitch = 0.98;  // human tone
  utterance.volume = 1;

  utterance.text = humanizeText(text);

  setStatus("AI Speaking... 🔊");

  isSpeaking = true;

  utterance.onend = () => {
    isSpeaking = false;
    setStatus("Listening... 🎤");
    if (onEnd && isCallActive) onEnd();
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

// ==========================
// 🎤 SPEECH TO TEXT
// ==========================
function listen() {
  if (!isCallActive || isSpeaking) return;

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.interimResults = false;

  setStatus("Listening... 🎤");

  recognition.start();

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;

    addMessage("user", transcript);
    sendToAI(transcript);
  };

  recognition.onerror = () => {
    setStatus("Mic error, retrying...");
    if (isCallActive) listen();
  };
}

// ==========================
// 🤖 SEND TO BACKEND
// ==========================
async function sendToAI(message) {
  try {
    const res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, sessionId: "default" })
    });

    const data = await res.json();

    addMessage("bot", data.reply);

    speakHuman(data.reply, () => {
      listen();
    });

  } catch (err) {
    console.error(err);
    setStatus("Server error");
  }
}

// ==========================
// 🚀 START CALL
// ==========================
async function startCall() {
  isCallActive = true;
  setStatus("Starting Call...");

  try {
    const res = await fetch("http://localhost:3000/start");
    const data = await res.json();

    addMessage("bot", data.reply);

    speakHuman(data.reply, () => {
      listen();
    });

  } catch (err) {
    console.error(err);
    setStatus("Failed to start call");
  }
}

// ==========================
// 🛑 STOP CALL
// ==========================
function stopCall() {
  isCallActive = false;
  isSpeaking = false;

  setStatus("Call Ended");

  speechSynthesis.cancel();
}

// ==========================
// 📤 MANUAL SEND
// ==========================
function sendMessage() {
  const msg = document.getElementById("message").value;
  if (!msg) return;

  addMessage("user", msg);
  sendToAI(msg);

  document.getElementById("message").value = "";
}

</script>

</body>
</html>
